name: Build and Release PHP 8.1 (macOS)

on:
  workflow_dispatch:   # 手动触发
  push:
    tags:
      - 'php-8.1-*'

jobs:
  build_and_release:
    name: Build and Release PHP 8.1 (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/software/php/php-8.1
      PHP_VERSION: 8.1.31
      MACOSX_DEPLOYMENT_TARGET: 10.13

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build PHP 8.1
        run: |
          chmod +x mac_arm64/php/php-8.1.sh
          ./mac_arm64/php/php-8.1.sh

      - name: Show PHP info
        run: |
          echo "=== PHP version ==="
          "$PREFIX/bin/php" -v
          echo "=== PHP modules ==="
          "$PREFIX/bin/php" -m

      - name: Package artifact
        run: |
          tar -czf php-8.1-macos.tar.gz -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: php-8.1-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
