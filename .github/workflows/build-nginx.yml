name: Build and Release nginx (macOS)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. nginx-1.30.2)"
        required: true
  push:
    tags:
      - 'nginx-*'

jobs:
  build_and_release:
    name: Build and Release nginx (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/childApp/server/nginx
      NGINX_VERSION: 1.30.2
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare EServer Library
        run: |
          sudo mkdir -p /Applications/EServer/Library
          sudo cp -R Library/* /Applications/EServer/Library/
          echo "===== /Applications/EServer/Library ====="
          ls -a /Applications/EServer/Library

      - name: Build nginx
        run: |
          chmod +x mac_arm64/nginx.sh
          ./mac_arm64/nginx.sh

      - name: Debug workspace
        run: |
          echo "===== PWD ====="
          pwd

          echo "===== ROOT LS ====="
          ls -la

          echo "===== FULL TREE ====="
          find . -maxdepth 3 -type f -print

      - name: Show nginx info
        run: |
          FILE="$PREFIX/sbin/nginx"
          echo "=== nginx version ==="
          "$FILE" -V 2>&1
          echo "=== file architectures ==="
          lipo -info "$FILE"
          echo "=== file minimum macOS version ==="
          otool -l "$FILE" | grep -A 3 LC_BUILD_VERSION
          echo "=== file dependencies ==="
          otool -L "$FILE"
          echo "=== file rpath ==="
          otool -l "$FILE" | grep -A2 LC_RPATH

      - name: Set artifact name
        run: echo "ARTIFACT_NAME=nginx-macos-${NGINX_VERSION}.tar.gz" >> $GITHUB_ENV

      - name: Package artifact
        run: |
          tar -czf "$ARTIFACT_NAME" -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ${{ env.ARTIFACT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
