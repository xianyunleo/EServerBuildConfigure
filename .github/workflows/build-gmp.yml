name: Build and Release GMP (macOS)

on:
  workflow_dispatch:   # 手动触发
  push:
    tags:
      - 'gmp-*'

jobs:
  build_and_release:
    name: Build and Release GMP (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/Library/gmp
      GMP_VERSION: 6.3.0
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build GMP
        run: |
          chmod +x mac_arm64/base/gmp.sh
          ./mac_arm64/base/gmp.sh

      - name: Show file info
        run: |
          FILE="$PREFIX/lib/libgmp.dylib"
          echo "=== file architectures ==="
          lipo -info "$FILE"
          echo "=== file minimum macOS version ==="
          otool -l "$FILE" | grep -A 3 LC_BUILD_VERSION
          echo "=== file dependencies ==="
          otool -L "$FILE"

      - name: Package artifact
        run: |
          tar -czf gmp-macos.tar.gz -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: gmp-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
