name: Build and Release zlib (macOS)

on:
  push:
    tags:
      - 'zlib-*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. zlib-1.3.2)"
        required: true

jobs:
  build_and_release:
    name: Build and Release zlib (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/Library/zlib
      ZLIB_VERSION: 1.3.2
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build zlib
        run: |
          chmod +x mac_arm64/base/zlib.sh
          ./mac_arm64/base/zlib.sh

      - name: Show file info
        run: |
          FILE="$PREFIX/lib/libz.dylib"
          echo "=== file architectures ==="
          lipo -info "$FILE"
          echo "=== file minimum macOS version ==="
          otool -l "$FILE" | grep -A 3 LC_BUILD_VERSION
          echo "=== file dependencies ==="
          otool -L "$FILE"

      - name: Package artifact
        run: |
          tar -czf "zlib-macos-${{ env.ZLIB_VERSION }}.tar.gz"  -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: zlib-macos-${{ env.ZLIB_VERSION }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
