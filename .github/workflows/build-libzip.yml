name: Build and Release libzip (macOS)

on:
  push:
    tags:
      - 'libzip-*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. libzip-1.11.4)"
        required: true

jobs:
  build_and_release:
    name: Build and Release libzip (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/Library/libzip
      LIBZIP_VERSION: 1.11.4
      OPENSSL_PREFIX: /Applications/EServer/Library/openssl
      ZLIB_PREFIX: /Applications/EServer/Library/zlib
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare EServer Library
        run: |
          sudo mkdir -p /Applications/EServer/Library
          if [ -d Library ]; then
            sudo cp -R Library/* /Applications/EServer/Library/
          fi
          echo "===== /Applications/EServer/Library ====="
          ls -a /Applications/EServer/Library

      - name: Build libzip
        run: |
          chmod +x mac_arm64/base/libzip.sh
          ./mac_arm64/base/libzip.sh

      - name: Debug workspace
        run: |
          echo "===== PWD ====="
          pwd
          echo "===== ROOT LS ====="
          ls -la
          echo "===== FULL TREE ====="
          find . -maxdepth 3 -type f -print

      - name: Show file info
        run: |
          FILE="$PREFIX/lib/libzip.dylib"
          if [ -f "$FILE" ]; then
            echo "=== file architectures ==="
            lipo -info "$FILE" 2>/dev/null || file "$FILE"
            echo "=== file minimum macOS version ==="
            otool -l "$FILE" | grep -A 3 LC_BUILD_VERSION
            echo "=== file dependencies ==="
            otool -L "$FILE"
          else
            echo "ERROR: $FILE not found!"
            ls -la "$PREFIX/lib/"
            exit 1
          fi

      - name: Set artifact name
        run: echo "ARTIFACT_NAME=libzip-macos-${LIBZIP_VERSION}.tar.gz" >> $GITHUB_ENV

      - name: Package artifact
        run: |
          tar -czf "$ARTIFACT_NAME" -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ${{ env.ARTIFACT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

