name: Build and Release PHP 8.0 (macOS)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. php-8.0.30)"
        required: true
  push:
    tags:
      - 'php-8.0-*'

jobs:
  build_and_release:
    name: Build and Release PHP 8.0 (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/software/php/php-8.0
      PHP_VERSION: 8.0.30
      MACOSX_DEPLOYMENT_TARGET: 10.13

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build PHP 8.0
        run: |
          chmod +x mac_arm64/php/php-8.0.sh
          ./mac_arm64/php/php-8.0.sh

      - name: Debug workspace
        run: |
          echo "===== PWD ====="
          pwd
          
          echo "===== ROOT LS ====="
          ls -la
          
          echo "===== FULL TREE ====="
          find . -maxdepth 3 -type f -print

      - name: Show PHP info
        run: |
          echo "=== PHP version ==="
          "$PREFIX/bin/php" -v
          echo "=== PHP modules ==="
          "$PREFIX/bin/php" -m

      - name: Set artifact name
        run: echo "ARTIFACT_NAME=php-8.0-macos-${PHP_VERSION}.tar.gz" >> $GITHUB_ENV

      - name: Package artifact
        run: |
          tar -czf "$ARTIFACT_NAME"  -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ${{ env.ARTIFACT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
