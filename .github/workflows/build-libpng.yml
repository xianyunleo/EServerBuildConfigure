name: Build and Release libpng (macOS)

on:
  push:
    tags:
      - 'libpng-*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. libpng-1.6.58)"
        required: true

jobs:
  build_and_release:
    name: Build and Release libpng (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/Library/libpng
      LIBPNG_VERSION: 1.6.58
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare EServer Library
        run: |
          sudo mkdir -p /Applications/EServer/Library
          sudo cp -R Library/* /Applications/EServer/Library/
          echo "===== /Applications/EServer/Library ====="
          ls -a /Applications/EServer/Library

      - name: Build libpng
        run: |
          chmod +x mac_arm64/libpng.sh
          ./mac_arm64/libpng.sh

      - name: Show file info
        run: |
          FILE="$PREFIX/lib/libpng16.dylib"
          echo "=== file architectures ==="
          lipo -info "$FILE"
          echo "=== file minimum macOS version ==="
          otool -l "$FILE" | grep -A 3 LC_BUILD_VERSION
          echo "=== file dependencies ==="
          otool -L "$FILE"

      - name: Package artifact
        run: |
          tar -czf "libpng-macos-${LIBPNG_VERSION}.tar.gz" -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"
          
      - name: Debug workspace
        run: |
          echo "===== PWD ====="
          pwd
      
          echo "===== ROOT LS ====="
          ls -la
      
          echo "===== FULL TREE ====="
          find . -maxdepth 3 -type f -print
      
          echo "===== LOOK FOR CONFIG.LOG ====="
          find . -name config.log -type f -print
    
      - name: Prepare logs
        run: |
          find ./build -name config.log -type f -exec cp {} config-libpng.log \; || true

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: |
            libpng-macos-${{ env.LIBPNG_VERSION }}.tar.gz
            config-libpng.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
