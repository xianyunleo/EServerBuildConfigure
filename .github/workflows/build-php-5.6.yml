name: Build and Release PHP 5.6 (macOS)

on:
  workflow_dispatch:   # 手动触发
  push:
    tags:
      - 'php-5.6-*'

jobs:
  build_and_release:
    name: Build and Release PHP 5.6 (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/software/php/php-5.6
      PHP_VERSION: 5.6.40
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build PHP 5.6
        run: |
          chmod +x mac_arm64/php/php-5.6.sh
          ./mac_arm64/php/php-5.6.sh

      - name: Show PHP info
        run: |
          echo "=== PHP version ==="
          "$PREFIX/bin/php" -v
          echo "=== PHP modules ==="
          "$PREFIX/bin/php" -m

      - name: Package artifact
        run: |
          tar -czf php-5.6-macos.tar.gz -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: php-5.6-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
