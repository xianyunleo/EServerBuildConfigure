name: Build and Release MySQL 5.7 (macOS)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. mysql-5.7.44)"
        required: true
  push:
    tags:
      - 'mysql-5.7.*'

jobs:
  build_and_release:
    name: Build and Release MySQL 5.7 (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/childApp/server/mysql-5.7
      MYSQL_VERSION: 5.7.44
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare EServer Library
        run: |
          sudo mkdir -p /Applications/EServer/Library
          sudo cp -R Library/* /Applications/EServer/Library/ 2>/dev/null || true

          # 从 release 下载 openssl@1.1（5.7 依赖 OpenSSL 1.1.x）
          echo "===== Downloading openssl@1.1 from release ====="
          curl -fL -o /tmp/openssl-1.1.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/openssl-1.1.1w/openssl-1.1-macos-1.1.1w.tar.gz"
          sudo tar -xzf /tmp/openssl-1.1.tar.gz -C /Applications/EServer/Library/

          echo "===== /Applications/EServer/Library ====="
          ls -a /Applications/EServer/Library
          echo "===== openssl@1.1 check ====="
          ls -la /Applications/EServer/Library/openssl@1.1/lib/

      - name: Build MySQL 5.7
        run: |
          chmod +x mac_arm64/server/mysql-5.7.sh
          ./mac_arm64/server/mysql-5.7.sh

      - name: Debug workspace
        run: |
          echo "===== PWD ====="
          pwd

          echo "===== ROOT LS ====="
          ls -la

          echo "===== FULL TREE ====="
          find . -maxdepth 3 -type f -print

      - name: Show MySQL info
        run: |
          echo "=== mysqld --version ==="
          "$PREFIX/bin/mysqld" --version 2>&1 || true
          echo "=== mysql --version ==="
          "$PREFIX/bin/mysql" --version 2>&1 || true
          echo "=== file architectures ==="
          for f in "$PREFIX/bin/mysqld" "$PREFIX/bin/mysql"; do
            lipo -info "$f" 2>/dev/null || file "$f"
          done
          echo "=== file minimum macOS version ==="
          otool -l "$PREFIX/bin/mysqld" | grep -A 3 LC_BUILD_VERSION
          echo "=== file dependencies ==="
          otool -L "$PREFIX/bin/mysqld"

      - name: Set artifact name
        run: echo "ARTIFACT_NAME=mysql-5.7.tar.xz" >> $GITHUB_ENV

      - name: Package artifact
        run: |
          tar -cJf "$ARTIFACT_NAME" -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload CMake logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-logs-failed
          path: cmake_logs/

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ${{ env.ARTIFACT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
