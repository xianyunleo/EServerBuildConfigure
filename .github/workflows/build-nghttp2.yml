name: Build and Release nghttp2 (macOS)

on:
  workflow_dispatch:   # 手动触发
  push:
    tags:
      - 'nghttp2-*'

jobs:
  build_and_release:
    name: Build and Release nghttp2 (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/Library/nghttp2
      NGHTTP2_VERSION: 1.64.0
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build nghttp2
        run: |
          chmod +x mac_arm64/base/nghttp2.sh
          ./mac_arm64/base/nghttp2.sh

      - name: Show file info
        run: |
          FILE="$PREFIX/lib/libnghttp2.dylib"
          echo "=== file architectures ==="
          lipo -info "$FILE"
          echo "=== file minimum macOS version ==="
          otool -l "$FILE" | grep -A 3 LC_BUILD_VERSION
          echo "=== file dependencies ==="
          otool -L "$FILE"

      - name: Package artifact
        run: |
          tar -czf nghttp2-macos.tar.gz -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: nghttp2-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
