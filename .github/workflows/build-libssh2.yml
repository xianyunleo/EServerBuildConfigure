name: Build and Release libssh2 (macOS)

on:
  push:
    tags:
      - 'libssh2-*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. libssh2-1.11.1)"
        required: true

jobs:
  build_and_release:
    name: Build and Release libssh2 (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/Library/libssh2
      LIBSSH2_VERSION: 1.11.1
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare EServer Library
        run: |
          sudo mkdir -p /Applications/EServer/Library
          if [ -d Library ]; then
            sudo cp -R Library/* /Applications/EServer/Library/
          fi
          echo "===== /Applications/EServer/Library ====="
          ls -a /Applications/EServer/Library

      - name: Build libssh2
        run: |
          chmod +x mac_arm64/libssh2.sh
          ./mac_arm64/libssh2.sh

      - name: Debug workspace
        run: |
          echo "===== PWD ====="
          pwd
          echo "===== ROOT LS ====="
          ls -la
          echo "===== FULL TREE ====="
          find . -maxdepth 3 -type f -print

      - name: Show file info
        run: |
          FILE="$PREFIX/lib/libssh2.dylib"
          echo "=== file architectures ==="
          lipo -info "$FILE" 2>/dev/null || file "$FILE"
          echo "=== file minimum macOS version ==="
          otool -l "$FILE" | grep -A 3 LC_BUILD_VERSION
          echo "=== file dependencies ==="
          otool -L "$FILE"

      - name: Set artifact name
        run: echo "ARTIFACT_NAME=libssh2-macos-${LIBSSH2_VERSION}.tar.gz" >> $GITHUB_ENV

      - name: Package artifact
        run: |
          tar -czf "$ARTIFACT_NAME" -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ${{ env.ARTIFACT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
