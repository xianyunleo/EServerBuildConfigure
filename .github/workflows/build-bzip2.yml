jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build bzip2
        run: |
          chmod +x mac_arm64/base/bzip2.sh
          ./mac_arm64/base/bzip2.sh

      - name: Package artifact
        run: |
          tar -czf bzip2-macos.tar.gz -C /Applications/EServer/Library bzip2

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: bzip2-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
