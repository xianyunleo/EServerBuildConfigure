name: Build and Release bzip2 (macOS)  # workflow 名称

on:
  push:
    tags:
      - 'v*'  # 当打 tag 时触发
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build bzip2
        run: |
          chmod +x mac_arm64/base/bzip2.sh
          ./mac_arm64/base/bzip2.sh

      - name: Show libbz2.dylib info
        run: |
          echo "=== libbz2.dylib architectures ==="
          lipo -info "$PREFIX/lib/libbz2.dylib"
          echo "=== libbz2.dylib minimum macOS version ==="
          otool -l "$PREFIX/lib/libbz2.dylib" | grep -A 3 LC_VERSION_MIN_MACOSX

      - name: Package artifact
        run: |
          tar -czf bzip2-macos.tar.gz -C /Applications/EServer/Library bzip2

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: bzip2-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
