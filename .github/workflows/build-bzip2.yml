name: Build and Release bzip2 (macOS)

on:
  push:
    tags:
      - 'bzip2-*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. bzip2-1.0.8)"
        required: true

jobs:
  build_and_release:
    name: Build and Release bzip2 (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/Library/bzip2
      BZIP2_VERSION: 1.0.8
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build bzip2
        run: |
          chmod +x mac_arm64/base/bzip2.sh
          ./mac_arm64/base/bzip2.sh

      - name: Show file info
        run: |
          FILE="$PREFIX/lib/libbz2.dylib"
          echo "=== file architectures ==="
          lipo -info "$FILE"
          echo "=== file minimum macOS version ==="
          otool -l "$FILE" | grep -A 3 LC_BUILD_VERSION
          echo "=== file dependencies ==="
          otool -L "$FILE"


      - name: Package artifact
        run: |
          tar -czf bzip2-macos.tar.gz -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Set artifact name
        run: echo "ARTIFACT_NAME=bzip2-macos-${BZIP2_VERSION}.tar.gz" >> $GITHUB_ENV

      - name: Package artifact
        run: |
          tar -czf "${{ ARTIFACT_NAME }}"  -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ${{ ARTIFACT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
