name: Build and Release libjpeg-turbo (macOS)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. libjpeg-turbo-3.1.4.1)"
        required: true
  push:
    tags:
      - 'libjpeg-turbo-*'

jobs:
  build_and_release:
    name: Build and Release libjpeg-turbo (macOS)
    runs-on: macos-latest
    env:
      PREFIX: /Applications/EServer/Library/libjpeg-turbo
      JPEG_VERSION: 3.1.4.1
      MACOSX_DEPLOYMENT_TARGET: 11.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build libjpeg-turbo
        run: |
          chmod +x mac_arm64/base/libjpeg-turbo.sh
          ./mac_arm64/base/libjpeg-turbo.sh

      - name: Debug workspace
        run: |
          echo "===== PWD ====="
          pwd
          
          echo "===== ROOT LS ====="
          ls -la
          
          echo "===== FULL TREE ====="
          find . -maxdepth 3 -type f -print

      - name: Show file info
        run: |
          FILE="$PREFIX/lib/libjpeg.dylib"
          echo "=== file architectures ==="
          lipo -info "$FILE"
          echo "=== file minimum macOS version ==="
          otool -l "$FILE" | grep -A 3 LC_BUILD_VERSION
          echo "=== file dependencies ==="
          otool -L "$FILE"
          echo "=== file rpath ==="
          otool -l "$FILE" | grep -A2 LC_RPATH

      - name: Show bin/cjpeg info
        run: |
          BIN="$PREFIX/bin/cjpeg"
          echo "=== $BIN version ==="
          "$BIN" -version || "$BIN" --version || echo "No version flag recognized"
          echo "=== $BIN dependencies ==="
          otool -L "$BIN"

      - name: Set artifact name
        run: echo "ARTIFACT_NAME=libjpeg-turbo-macos-${JPEG_VERSION}.tar.gz" >> $GITHUB_ENV

      - name: Package artifact
        run: |
          tar -czf "$ARTIFACT_NAME"  -C "$(dirname "$PREFIX")" "$(basename "$PREFIX")"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ${{ env.ARTIFACT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
